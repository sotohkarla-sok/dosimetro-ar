<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dosímetro TLD — AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #050a0f;
      --accent: #00e5ff;
      --glow: rgba(0,229,255,0.25);
      --text: #c8e6f0;
      --dim: #3a5a6a;
      --accent2: #ff6b35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      border-bottom: 1px solid rgba(0,229,255,0.1);
      background: rgba(5,10,15,0.85);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo span { color: var(--dim); }

    /* Pantalla inicial */
    #idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: opacity 0.5s, transform 0.5s;
    }

    #idle.oculto {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
      position: absolute;
    }

    .icono {
      width: 80px; height: 80px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: brillar 2s ease-in-out infinite;
    }

    @keyframes brillar {
      0%, 100% { box-shadow: 0 0 0 0 var(--glow); }
      50% { box-shadow: 0 0 24px 6px var(--glow); }
    }

    .icono svg { width: 38px; height: 38px; fill: var(--accent); }

    .titulo {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      line-height: 1.2;
    }

    .titulo em {
      display: block;
      font-style: normal;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 6px;
      margin-bottom: 4px;
    }

    .subtitulo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* Botón de toque */
    .toque-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-top: 8px;
    }

    .anillo {
      width: 60px; height: 60px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .anillo::after {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(0,229,255,0.35);
      border-radius: 50%;
      animation: onda 2s ease-out infinite;
    }

    @keyframes onda {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    .anillo svg { width: 24px; height: 24px; fill: var(--accent); }

    .toque-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Visor del modelo */
    #visor {
      position: fixed;
      inset: 0;
      padding-top: 56px;
      padding-bottom: 100px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #visor.visible {
      opacity: 1;
      pointer-events: all;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
      --poster-color: transparent;
    }

    /* Botón inferior al ver el modelo */
    #controles {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #controles.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-anillo {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,229,255,0.05);
      transition: background 0.15s, transform 0.15s;
    }

    .ctrl-anillo:active { transform: scale(0.92); background: rgba(0,229,255,0.15); }
    .ctrl-anillo svg { width: 22px; height: 22px; fill: var(--accent); }

    .ctrl-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* Botón AR */
    .ar-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,107,53,0.1);
      border: 1px solid var(--accent2);
      border-radius: 24px;
      padding: 10px 16px;
      color: var(--accent2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .ar-btn svg { width: 18px; height: 18px; fill: var(--accent2); }
    .ar-btn:active { background: rgba(255,107,53,0.2); }

    /* Flash al tocar */
    #flash {
      position: fixed;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.08s;
    }

    /* Esquinas decorativas */
    .corner { position: fixed; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.3; z-index: 5; }
    .corner.tl { top: 56px; left: 0; border-width: 2px 0 0 2px; }
    .corner.tr { top: 56px; right: 0; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>

  <div id="flash"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <header>
    <div class="logo">TLD<span>_</span>DOSIMETER <span>// AR</span></div>
  </header>

  <!-- Pantalla inicial -->
  <div id="idle">
    <div class="icono">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="titulo">
      <em>Dosímetro</em>
      TLD
    </div>
    <div class="subtitulo">Termoluminiscencia · Modelo Interactivo</div>
    <div class="toque-btn" id="btn-iniciar">
      <div class="anillo">
        <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 14.21 3 12 3S8 5.01 8 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.91-1.38z"/></svg>
      </div>
      <div class="toque-label">Toca para ver el modelo</div>
    </div>
  </div>

  <!-- Visor 3D -->
  <div id="visor">
    <model-viewer
      id="mv"
      src="TLD.glb"
      alt="Dosímetro TLD"
      shadow-intensity="1"
      camera-controls
      auto-rotate
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      exposure="1"
      environment-image="neutral"
      interaction-prompt="none"
    ></model-viewer>
  </div>

  <!-- Controles -->
  <div id="controles">
    <div class="ctrl-btn" id="btn-ocultar">
      <div class="ctrl-anillo">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </div>
      <div class="ctrl-label">ocultar</div>
    </div>
    <div class="ar-btn" id="btn-ar">
      <svg viewBox="0 0 24 24"><path d="M9 2L1 6v12l8 4 8-4V6L9 2zm0 2.18L15 7.5v9L9 19.82 3 16.5v-9L9 4.18z"/></svg>
      Ver en AR
    </div>
  </div>

  <script>
    const idle      = document.getElementById('idle');
    const visor     = document.getElementById('visor');
    const controles = document.getElementById('controles');
    const mv        = document.getElementById('mv');
    const flash     = document.getElementById('flash');
    const btnIniciar  = document.getElementById('btn-iniciar');
    const btnOcultar  = document.getElementById('btn-ocultar');
    const btnAR       = document.getElementById('btn-ar');

    let visible = false;

    function destello() {
      flash.style.opacity = '0.12';
      setTimeout(() => flash.style.opacity = '0', 80);
    }

    function mostrar() {
      destello();
      idle.classList.add('oculto');
      visor.classList.add('visible');
      controles.classList.add('visible');
      visible = true;
    }

    function ocultar() {
      destello();
      visor.classList.remove('visible');
      controles.classList.remove('visible');
      idle.classList.remove('oculto');
      visible = false;
    }

    btnIniciar.addEventListener('click', mostrar);
    btnOcultar.addEventListener('click', ocultar);
    btnAR.addEventListener('click', () => mv.activateAR());
  </script>
</body>
</html>
